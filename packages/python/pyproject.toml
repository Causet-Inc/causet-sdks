[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "causet-sdk"
version = "0.2.0"
description = "Python SDK for the Causet event-sourcing platform"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "httpx>=0.27,<1",
    "websockets>=13,<15",
]

[project.urls]
Homepage = "https://github.com/Causet-Inc/causet-sdks"
Repository = "https://github.com/Causet-Inc/causet-sdks"
Documentation = "https://github.com/Causet-Inc/causet-sdks/tree/main/packages/python"
Issues = "https://github.com/Causet-Inc/causet-sdks/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6",
    "respx>=0.22",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["causet_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["causet_sdk"]

[tool.coverage.report]
fail_under = 100

[tool.ruff]
target-version = "py310"
line-length = 100
