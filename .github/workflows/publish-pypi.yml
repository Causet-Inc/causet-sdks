name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate build only (skip twine upload)
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish causet-sdk
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build twine

      - name: Test
        run: pip install -e ".[dev]" && pytest --cov=causet_sdk --cov-fail-under=100

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        working-directory: .
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('packages/python/pyproject.toml','rb'))['project']['version'])")
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::pyproject.toml version (${PKG_VERSION}) does not match release tag (${VERSION})"
            exit 1
          fi

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/
          skip-existing: true
