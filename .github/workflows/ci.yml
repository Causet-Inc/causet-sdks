name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript:
    name: JavaScript / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest --cov=causet_sdk --cov-fail-under=100

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/go/go.sum
      - run: go test ./...

  java:
    name: Java
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B test

  laravel:
    name: Laravel / PHP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/laravel
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: composer test
