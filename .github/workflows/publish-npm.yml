name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run (no upload)
        required: false
        type: boolean
        default: true
      republish:
        description: Unpublish existing versions before publishing (required to replace 0.1.0 on npm)
        required: false
        type: boolean
        default: false
      scope:
        description: Which packages to publish
        required: false
        type: choice
        options:
          - all
          - js-and-next
        default: js-and-next

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish @causet/* packages
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --audit-level=high

      - name: Verify release tag matches package versions
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          for pkg in packages/core packages/js packages/node packages/next; do
            PKG_VERSION=$(node -p "require('./${pkg}/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::${pkg}/package.json version (${PKG_VERSION}) does not match release tag (${VERSION})"
              exit 1
            fi
          done

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ARGS="--access public --provenance"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          VERSION=$(node -p "require('./packages/core/package.json').version")
          SCOPE="${{ github.event.inputs.scope }}"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            SCOPE="all"
          fi

          unpublish_pkg() {
            local pkg="$1"
            echo "Unpublishing ${pkg}@${VERSION}..."
            npm unpublish "${pkg}@${VERSION}" --force 2>/dev/null || npm unpublish "${pkg}@${VERSION}" || true
          }

          publish_pkg() {
            local pkg="$1"
            echo "Publishing ${pkg}@${VERSION}..."
            npm publish -w "${pkg}" $ARGS
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.republish }}" = "true" ] && [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            if [ "$SCOPE" = "js-and-next" ]; then
              unpublish_pkg @causet/sdk-next
              unpublish_pkg @causet/sdk
              unpublish_pkg @causet/sdk-core
            else
              unpublish_pkg @causet/sdk-next
              unpublish_pkg @causet/sdk-node
              unpublish_pkg @causet/sdk
              unpublish_pkg @causet/sdk-core
            fi
            sleep 5
          fi

          # Dependency order: core must publish before dependents.
          if [ "$SCOPE" = "js-and-next" ]; then
            publish_pkg @causet/sdk-core
            publish_pkg @causet/sdk
            publish_pkg @causet/sdk-next
          else
            publish_pkg @causet/sdk-core
            publish_pkg @causet/sdk
            publish_pkg @causet/sdk-node
            publish_pkg @causet/sdk-next
          fi
